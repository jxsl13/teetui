name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: vet / build / test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      # Race detector requires cgo, so it only runs on Linux with CGO enabled.
      - name: Test (race)
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: 1
        run: go test -race ./...

      - name: Test
        if: runner.os != 'Linux'
        run: go test ./...
